name: Bug report
description: Report a reproducible issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact reproducible steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Platform, app version, device, web/mobile.
  - type: textarea
    id: security
    attributes:
      label: Security relevance
      description: Does this bug affect encryption, key continuity, auth, or privacy?
