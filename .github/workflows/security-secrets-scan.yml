name: Security Secrets Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository secret guard
        shell: bash
        run: bash scripts/check_no_secrets.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks (working tree)
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --no-git --source . --config .gitleaks.toml --redact --no-banner
