<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GitMit Flutter web app">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1a2b4b 0%, #0d1117 55%, #090c12 100%);
    }

    #gitmit-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 9999;
      transition: opacity 240ms ease;
    }

    #gitmit-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }

    .splash-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .splash-loader {
      width: 120px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      overflow: hidden;
      position: relative;
    }

    .splash-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      background: #58a6ff;
      border-radius: 999px;
      animation: gitmit-loader 1.2s infinite ease-in-out;
    }

    @keyframes gitmit-loader {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(290%);
      }
    }
  </style>

  <title>GitMit</title>
</head>
<body>
  <div id="gitmit-splash" aria-live="polite" aria-label="Loading GitMit">
    <img class="splash-logo" src="favicon.png" alt="GitMit" />
    <div class="splash-title">GitMit</div>
    <div class="splash-loader"></div>
  </div>
  <script>
    (function () {
      var splash = document.getElementById('gitmit-splash');
      function hideSplash() {
        if (!splash) return;
        splash.classList.add('hidden');
        setTimeout(function () {
          if (splash && splash.parentNode) {
            splash.parentNode.removeChild(splash);
          }
        }, 260);
      }

      // Flutter dispatches this when the first frame is rendered.
      window.addEventListener('flutter-first-frame', hideSplash, { once: true });

      // Fallback so users never stay stuck on splash if the event is missed.
      setTimeout(hideSplash, 10000);
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var baseHrefEl = document.querySelector('base');
        var baseHref = (baseHrefEl && baseHrefEl.getAttribute('href')) || '/';
        if (!baseHref.endsWith('/')) {
          baseHref += '/';
        }
        navigator.serviceWorker.register(baseHref + 'firebase-messaging-sw.js', {
          scope: baseHref,
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
