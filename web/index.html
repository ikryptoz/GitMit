<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GitMit Flutter web app">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GitMit</title>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var baseHrefEl = document.querySelector('base');
        var baseHref = (baseHrefEl && baseHrefEl.getAttribute('href')) || '/';
        if (!baseHref.endsWith('/')) {
          baseHref += '/';
        }
        navigator.serviceWorker.register(baseHref + 'firebase-messaging-sw.js', {
          scope: baseHref,
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
